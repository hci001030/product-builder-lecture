<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동물상 테스트 | Animal Face Test</title>
    <meta name="google-adsense-account" content="ca-pub-4467305769652314">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4467305769652314"
     crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <button id="theme-toggle">다크 모드 | Dark Mode</button>
        
        <header>
            <h1>🐶 동물상 테스트 🐱</h1>
            <p class="subtitle">나는 어떤 동물과 닮았을까?</p>
            <p class="subtitle-en">What animal do I look like?</p>
        </header>
        
        <main class="test-section">
            <div class="button-group">
                <button type="button" id="start-btn" class="main-btn">카메라로 시작 | Start with Webcam</button>
                <label for="upload-input" class="main-btn upload-label">
                    사진 업로드 | Upload Photo
                    <input type="file" id="upload-input" accept="image/*" style="display: none;">
                </label>
            </div>

            <div id="loading-spinner" class="spinner" style="display: none;"></div>
            
            <div id="image-container">
                <div id="webcam-container"></div>
                <img id="uploaded-image" src="#" alt="uploaded image" style="display: none;">
            </div>

            <div id="label-container">
                <!-- Predictions will be injected here -->
            </div>

            <button id="reset-btn" class="secondary-btn" style="display: none;">다시 하기 | Try Again</button>
        </main>

        <section class="info-section">
            <hr>
            <div class="contact-form">
                <h2>협업 문의 | Partnership Inquiry</h2>
                <form action="https://formspree.io/f/mvzvdllk" method="POST">
                    <input type="email" name="email" placeholder="이메일 | Email" required>
                    <textarea name="message" placeholder="메시지 | Message" required></textarea>
                    <button type="submit">보내기 | Submit</button>
                </form>
            </div>

            <hr>

            <div id="disqus_thread"></div>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script src="main.js"></script>
    <script>
        (function() { 
        var d = document, s = d.createElement('script');
        s.src = 'https://productbuilder-8jbmlzrczj.disqus.com/embed.js';
        s.setAttribute('data-timestamp', +new Date());
        (d.head || d.body).appendChild(s);
        })();
    </script>
</body>
</html>
