<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>페이지를 찾을 수 없습니다 | 두부상 vs 아랍상 테스트</title>
  <meta name="robots" content="noindex, follow" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
      background: #ffffff;
      color: #111111;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      text-align: center;
    }
    .badge {
      display: inline-block;
      background: #16A34A;
      color: #fff;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 2px;
      padding: 6px 14px;
      border-radius: 999px;
      margin-bottom: 24px;
    }
    .code {
      font-size: 96px;
      font-weight: 900;
      line-height: 1;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #3B82F6, #EAB308);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    h1 {
      font-size: 22px;
      font-weight: 900;
      margin-bottom: 12px;
      color: #111;
    }
    p {
      font-size: 15px;
      color: #4B6358;
      font-weight: 700;
      margin-bottom: 36px;
      line-height: 1.7;
    }
    .btn {
      display: inline-block;
      background: #16A34A;
      color: #fff;
      font-size: 16px;
      font-weight: 900;
      padding: 16px 36px;
      border-radius: 14px;
      text-decoration: none;
      border: 3px solid #111;
      box-shadow: 4px 4px 0 #111;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .btn:active {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0 #111;
    }
    .footer {
      margin-top: 48px;
      font-size: 12px;
      color: #aaa;
    }
  </style>
</head>
<body>
  <div class="badge">AI 관상 테스트</div>
  <div class="code">404</div>
  <h1>페이지를 찾을 수 없습니다</h1>
  <p>요청하신 페이지가 존재하지 않거나 이동되었습니다.<br/>두부상 vs 아랍상 테스트를 지금 바로 해보세요!</p>
  <a href="/" class="btn">홈으로 돌아가기</a>
  <div class="footer">© 2026 두부상 vs 아랍상 테스트</div>
</body>
</html>
